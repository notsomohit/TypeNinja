<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeNinja|test your typing speed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="heading">TypeNinja</h1>
        <div class="typingWrapper">                 
            <div class="textArea" id="textArea"></div>
            <textarea id="input" autofocus></textarea>
        </div>
        <!-- stats -->
        <div class="stats">
            <div class="time l" id="time">
                <h2 id="timer">30</h2>
                <p>s</p>
            </div>
            <div class="speed l" id="speed">
                <h2 id="speed_">50</h2><p>WPM</p>
            </div>
            <div class="accuracy l" id="accuracy">
                <h2 id="accuracy_">90</h2><p>%</p>
            </div>
        </div>
        <!-- new session -->
        <div class="newSession" id="newSession">
            <button class="btn">New Session</button>
        </div>
    </div>
</body>
</html>
