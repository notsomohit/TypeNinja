<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeNinja | Speed test</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">TypeNinja ⚡</div>
        <div class="nav-right">
            <a href="https://github.com/notsomohit" target="_blank" class="github-link">
                GitHub
            </a>
        </div>
    </nav>

    <div class="container">
        <h1 id="heading">TypeNinja</h1>

        <div class="typingWrapper">                 
            <div class="textArea" id="textArea"></div>
            <textarea id="input" autofocus></textarea>
        </div>

        <div class="stats">
            <div class="time l">
                <h2 id="timer">30</h2><p>s</p>
            </div>
            <div class="speed l">
                <h2 id="speed_">50</h2><p>WPM</p>
            </div>
            <div class="accuracy l">
                <h2 id="accuracy_">90</h2><p>%</p>
            </div>
        </div>

        <div class="newSession">
            <button class="btn">New Session</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
