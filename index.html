<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeNinja | Master Your Speed</title>
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- Sticky Glass Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="bolt">⚡</span> TypeNinja
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active">Test</a>
                <a href="#" class="nav-item">Leaderboard</a>
                <a href="https://github.com/notsomohit" target="_blank" class="github-btn">
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="test-section">
            <!-- Progress Tracker -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- Focus Stats -->
            <div class="focus-stats">
                <div class="stat-card">
                    <span class="stat-label">Time Left</span>
                    <div class="stat-value"><span id="timer">30</span><span class="unit">s</span></div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">WPM</span>
                    <div class="stat-value" id="speed_">0</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Accuracy</span>
                    <div class="stat-value"><span id="accuracy_">0</span><span class="unit">%</span></div>
                </div>
            </div>

            <!-- Typing Engine -->
            <div class="typing-container" id="typingContainer">
                <div class="typing-area" id="textArea"></div>
                <textarea id="input" autofocus spellcheck="false" autocomplete="off"></textarea>
                <div class="cursor" id="customCursor"></div>
                
                <!-- Results Overlay -->
                <div class="results-overlay" id="resultsOverlay">
                    <h2>Test Complete!</h2>
                    <div class="results-grid">
                        <div class="result-item">
                            <span class="label">Speed</span>
                            <div class="value"><span id="finalWpm">0</span><span class="unit">WPM</span></div>
                        </div>
                        <div class="result-item">
                            <span class="label">Accuracy</span>
                            <div class="value"><span id="finalAcc">0</span><span class="unit">%</span></div>
                        </div>
                    </div>
                    <button class="btn-primary" id="restartBtn">
                        <span class="icon">↺</span> Try Again
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn-primary" id="resetBtn">
                    <span class="icon">↺</span> New Session
                </button>
                <p class="hint">Press <kbd>Tab</kbd> + <kbd>Enter</kbd> to quickly restart</p>
            </div>
        </div>

        <!-- Sidebar / Results Section -->
        <aside class="sidebar">
            <div class="leaderboard-card glass">
                <div class="card-header">
                    <h3>🏆 High Scores</h3>
                </div>
                <ul class="score-list" id="highScoresList">
                    <li class="empty">No scores yet</li>
                </ul>
            </div>

            <div class="leaderboard-card glass">
                <div class="card-header">
                    <h3>🕒 Recent Activity</h3>
                </div>
                <ul class="score-list" id="recentScoresList">
                    <li class="empty">No scores yet</li>
                </ul>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
